<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Will It Cause Bloating?</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f7f8fa;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
      padding: 40px;
      width: 100%;
      max-width: 520px;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 8px;
    }

    .subtitle {
      color: #666;
      font-size: 0.9rem;
      margin-bottom: 32px;
    }

    .field {
      margin-bottom: 18px;
    }

    label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: #444;
      margin-bottom: 6px;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      font-size: 0.95rem;
      color: #1a1a2e;
      transition: border-color 0.2s;
      outline: none;
    }

    input[type="text"]:focus,
    input[type="password"]:focus {
      border-color: #6c63ff;
    }

    input:disabled {
      background: #f0f0f0;
      color: #999;
      cursor: not-allowed;
      border-color: #e0e0e0;
    }

    .buttons {
      display: flex;
      gap: 10px;
      margin-top: 24px;
    }

    button {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, opacity 0.2s;
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    #btn-ask {
      background: #6c63ff;
      color: white;
      flex: 1;
    }

    #btn-ask:hover:not(:disabled) {
      background: #5a52e0;
    }

    #btn-clear {
      background: #f0f0f0;
      color: #555;
    }

    #btn-clear:hover:not(:disabled) {
      background: #e4e4e4;
    }

    .result {
      margin-top: 28px;
      padding: 20px;
      border-radius: 10px;
      display: none;
    }

    .result.visible {
      display: block;
    }

    .result.yes {
      background: #eaffea;
      border: 1.5px solid #a8e6a8;
    }

    .result.no {
      background: #eaf3ff;
      border: 1.5px solid #a8ccf0;
    }

    .result.not-sure {
      background: #fff8ea;
      border: 1.5px solid #f0d9a8;
    }

    .result.error {
      background: #fff0f0;
      border: 1.5px solid #f0a8a8;
    }

    .answer-label {
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #888;
      margin-bottom: 4px;
    }

    .answer-text {
      font-size: 1.6rem;
      font-weight: 800;
      margin-bottom: 12px;
    }

    .result.yes .answer-text { color: #2e7d32; }
    .result.no .answer-text { color: #1565c0; }
    .result.not-sure .answer-text { color: #e65100; }
    .result.error .answer-text { color: #c62828; font-size: 1rem; }

    .reference {
      font-size: 0.85rem;
      color: #555;
    }

    .reference a {
      color: #6c63ff;
      word-break: break-all;
    }

    .spinner {
      display: none;
      margin-top: 28px;
      text-align: center;
      color: #888;
      font-size: 0.9rem;
    }

    .spinner.visible {
      display: block;
    }

    .spinner::before {
      content: "";
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2px solid #ccc;
      border-top-color: #6c63ff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .debug {
      margin-top: 32px;
      display: none;
    }

    .debug.visible {
      display: block;
    }

    .debug-title {
      font-size: 0.8rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: #aaa;
      margin-bottom: 12px;
      padding-bottom: 6px;
      border-bottom: 1px solid #eee;
    }

    .debug-section {
      margin-bottom: 14px;
    }

    .debug-label {
      font-size: 0.75rem;
      font-weight: 600;
      color: #999;
      margin-bottom: 4px;
    }

    .debug-box {
      background: #f6f6f6;
      border: 1px solid #e4e4e4;
      border-radius: 6px;
      padding: 10px 12px;
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
      font-size: 0.78rem;
      color: #444;
      white-space: pre-wrap;
      word-break: break-word;
      max-height: 180px;
      overflow-y: auto;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Will It Cause Bloating?</h1>
    <p class="subtitle">Enter a food and your Claude API key to find out.</p>

    <div class="field">
      <label for="food-input">Food</label>
      <input type="text" id="food-input" placeholder="e.g. broccoli, beans, dairy..." />
    </div>

    <div class="field">
      <label for="api-key-input">Claude API Key</label>
      <input type="password" id="api-key-input" placeholder="sk-ant-..." />
    </div>

    <div class="buttons">
      <button id="btn-ask">Ask and save the API key</button>
      <button id="btn-clear">Clear the API key</button>
    </div>

    <div class="spinner" id="spinner">Asking Claude...</div>
    <div class="result" id="result">
      <div class="answer-label">Answer</div>
      <div class="answer-text" id="answer-text"></div>
      <div class="reference" id="reference-text"></div>
    </div>

    <div class="debug" id="debug">
      <div class="debug-title">Debugging Information</div>
      <div class="debug-section">
        <div class="debug-label">Prompt sent to Claude</div>
        <div class="debug-box" id="debug-prompt"></div>
      </div>
      <div class="debug-section">
        <div class="debug-label">Raw response from Claude</div>
        <div class="debug-box" id="debug-response"></div>
      </div>
    </div>
  </div>

  <script>
    let savedApiKey = null;

    const foodInput = document.getElementById("food-input");
    const apiKeyInput = document.getElementById("api-key-input");
    const btnAsk = document.getElementById("btn-ask");
    const btnClear = document.getElementById("btn-clear");
    const spinner = document.getElementById("spinner");
    const resultDiv = document.getElementById("result");
    const answerText = document.getElementById("answer-text");
    const referenceText = document.getElementById("reference-text");
    const debugDiv = document.getElementById("debug");
    const debugPrompt = document.getElementById("debug-prompt");
    const debugResponse = document.getElementById("debug-response");

    function lockApiKey(key) {
      savedApiKey = key;
      apiKeyInput.value = "********";
      apiKeyInput.disabled = true;
    }

    function clearApiKey() {
      savedApiKey = null;
      apiKeyInput.value = "";
      apiKeyInput.disabled = false;
      apiKeyInput.type = "password";
    }

    function showResult(answer, link, isError) {
      resultDiv.className = "result visible";
      if (isError) {
        resultDiv.classList.add("error");
        answerText.textContent = answer;
        referenceText.textContent = "";
        return;
      }

      const normalized = answer.toLowerCase().trim();
      if (normalized === "yes") {
        resultDiv.classList.add("yes");
        answerText.textContent = "Yes";
      } else if (normalized === "no") {
        resultDiv.classList.add("no");
        answerText.textContent = "No";
      } else {
        resultDiv.classList.add("not-sure");
        answerText.textContent = "Not sure";
      }

      if (link) {
        referenceText.innerHTML = `Reference: <a href="${escapeHtml(link)}" target="_blank" rel="noopener noreferrer">${escapeHtml(link)}</a>`;
      } else {
        referenceText.textContent = "";
      }
    }

    function escapeHtml(str) {
      return str
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    async function askClaude(food, apiKey) {
      const prompt = `Will eating ${food} cause bloating? Return only the final answer as "Yes", "No", or "Not Sure", and give one reference link from the Internet. Your answer should be in the json format such as: {"answer": <Yes, No, or Not Sure>, "link": <the URL to the source of the answer, if web search was used; otherwise say None>}. Please do not include any explanation or text outside of the JSON format.`;

      debugPrompt.textContent = prompt;
      debugResponse.textContent = "";
      debugDiv.classList.add("visible");

      const response = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "x-api-key": apiKey,
          "anthropic-version": "2023-06-01",
          "anthropic-dangerous-direct-browser-access": "true",
        },
        body: JSON.stringify({
          model: "claude-sonnet-4-6",
          max_tokens: 256,
          messages: [{ role: "user", content: prompt }],
        }),
      });

      const rawText = await response.text();
      debugResponse.textContent = rawText;

      if (!response.ok) {
        let errMsg = `HTTP ${response.status}`;
        try { errMsg = JSON.parse(rawText)?.error?.message || errMsg; } catch (_) {}
        throw new Error(errMsg);
      }

      const data = JSON.parse(rawText);
      const text = data.content?.[0]?.text ?? "";

      // Extract JSON from the response text
      const match = text.match(/\{[\s\S]*\}/);
      if (!match) throw new Error("Could not parse Claude's response as JSON.");
      return JSON.parse(match[0]);
    }

    btnAsk.addEventListener("click", async () => {
      const food = foodInput.value.trim();
      const apiKey = savedApiKey || apiKeyInput.value.trim();

      if (!food) {
        alert("Please enter a food.");
        return;
      }
      if (!apiKey) {
        alert("Please enter your Claude API key.");
        return;
      }

      // Lock the API key if not already locked
      if (!savedApiKey) {
        lockApiKey(apiKey);
      }

      // Reset result
      resultDiv.className = "result";
      spinner.classList.add("visible");
      btnAsk.disabled = true;

      try {
        const json = await askClaude(food, apiKey);
        showResult(json.answer, json.link, false);
      } catch (err) {
        showResult("Error: " + err.message, null, true);
      } finally {
        spinner.classList.remove("visible");
        btnAsk.disabled = false;
      }
    });

    btnClear.addEventListener("click", () => {
      clearApiKey();
      resultDiv.className = "result";
      spinner.classList.remove("visible");
      debugDiv.classList.remove("visible");
    });

    // Allow pressing Enter in food field to trigger the button
    foodInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") btnAsk.click();
    });
  </script>
</body>
</html>
